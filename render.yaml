# Render Blueprint — Kilimo Bridge API
# Persistent disk ($7/mo Starter) keeps farmer data across redeploys.
services:
  - type: web
    name: kilimo-bridge-api
    runtime: node
    rootDir: backend
    buildCommand: npm run build:render
    startCommand: npm start
    disk:
      name: kilimo-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/kilimo.db
      - key: PILOT_OTP
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: RESTORE_DB_SECRET
        sync: false
      - key: STARTUP_DB_URL
        sync: false
      - key: STARTUP_DB_TOKEN
        sync: false
