# Kilimo Bridge — Netlify (web app) + Render (API)
# See DEPLOY.md for step-by-step instructions.

[build]
  command = "bash scripts/build-web.sh"
  publish = "mobile/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/_expo/static/js/web/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
